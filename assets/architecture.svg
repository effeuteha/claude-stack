<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="scGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5b21b6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gsdGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mcpGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="plugGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b45309;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="spGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mystiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0e7490;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" fill="#e2e8f0" font-size="28" font-weight="700" letter-spacing="1">Claude Stack</text>
  <text x="600" y="78" text-anchor="middle" fill="#94a3b8" font-size="14">The Unified AI Development Workflow</text>

  <!-- LAYER 1: Strategic + Lifecycle + Code Intelligence -->

  <!-- SuperClaude Box -->
  <rect x="40" y="110" width="260" height="240" rx="12" fill="url(#scGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="170" y="140" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">SuperClaude</text>
  <text x="170" y="158" text-anchor="middle" fill="#c4b5fd" font-size="11">THE BRAIN — Strategic Thinking</text>
  <line x1="70" y1="168" x2="270" y2="168" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
  <text x="60" y="188" fill="#e2e8f0" font-size="11">brainstorm    research</text>
  <text x="60" y="206" fill="#e2e8f0" font-size="11">design        estimate</text>
  <text x="60" y="224" fill="#e2e8f0" font-size="11">analyze       spec-panel</text>
  <text x="60" y="242" fill="#e2e8f0" font-size="11">implement     test</text>
  <text x="60" y="260" fill="#e2e8f0" font-size="11">improve       reflect</text>
  <text x="60" y="278" fill="#e2e8f0" font-size="11">pm            recommend</text>
  <text x="60" y="296" fill="#e2e8f0" font-size="11">git           workflow</text>
  <rect x="60" y="320" width="200" height="22" rx="4" fill="#5b21b6" opacity="0.6"/>
  <text x="160" y="335" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">~30 commands</text>

  <!-- GSD Box -->
  <rect x="330" y="110" width="260" height="240" rx="12" fill="url(#gsdGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="460" y="140" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">GSD</text>
  <text x="460" y="158" text-anchor="middle" fill="#93c5fd" font-size="11">THE SPINE — Lifecycle + State</text>
  <line x1="360" y1="168" x2="560" y2="168" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  <text x="350" y="188" fill="#e2e8f0" font-size="11">new-project   plan-phase</text>
  <text x="350" y="206" fill="#e2e8f0" font-size="11">execute-phase verify-work</text>
  <text x="350" y="224" fill="#e2e8f0" font-size="11">autonomous    debug</text>
  <text x="350" y="242" fill="#e2e8f0" font-size="11">map-codebase  progress</text>
  <text x="350" y="260" fill="#e2e8f0" font-size="11">discuss-phase add-tests</text>
  <text x="350" y="278" fill="#e2e8f0" font-size="11">new-milestone stats</text>
  <text x="350" y="296" fill="#e2e8f0" font-size="11">pause/resume  health</text>
  <rect x="350" y="320" width="200" height="22" rx="4" fill="#1d4ed8" opacity="0.6"/>
  <text x="450" y="335" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">~37 commands</text>

  <!-- Code Intelligence Box -->
  <rect x="620" y="110" width="280" height="240" rx="12" fill="url(#mcpGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="760" y="140" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">Code Intelligence</text>
  <text x="760" y="158" text-anchor="middle" fill="#6ee7b7" font-size="11">THE HANDS — MCP Servers</text>
  <line x1="650" y1="168" x2="870" y2="168" stroke="#10b981" stroke-width="1" opacity="0.5"/>
  <text x="640" y="192" fill="#a7f3d0" font-size="12" font-weight="600">Serena</text>
  <text x="640" y="210" fill="#e2e8f0" font-size="11">find_symbol  replace_symbol</text>
  <text x="640" y="226" fill="#e2e8f0" font-size="11">referencing   memories</text>
  <text x="640" y="250" fill="#a7f3d0" font-size="12" font-weight="600">Context7</text>
  <text x="640" y="268" fill="#e2e8f0" font-size="11">resolve-library  query-docs</text>
  <text x="640" y="292" fill="#a7f3d0" font-size="12" font-weight="600">Sequential Thinking</text>
  <text x="640" y="310" fill="#e2e8f0" font-size="11">Multi-step reasoning chains</text>
  <rect x="640" y="320" width="240" height="22" rx="4" fill="#047857" opacity="0.6"/>
  <text x="760" y="335" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">3 MCP servers (+ Playwright optional)</text>

  <!-- LAYER 2: Plugins + Superpowers + Mysti -->

  <!-- Plugins Box -->
  <rect x="40" y="380" width="260" height="170" rx="12" fill="url(#plugGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="170" y="410" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">Plugins</text>
  <text x="170" y="428" text-anchor="middle" fill="#fde68a" font-size="11">Specialized Workflows</text>
  <line x1="70" y1="438" x2="270" y2="438" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
  <text x="60" y="458" fill="#e2e8f0" font-size="11">feature-dev      code-review</text>
  <text x="60" y="476" fill="#e2e8f0" font-size="11">frontend-design  ralph-loop</text>
  <text x="60" y="494" fill="#e2e8f0" font-size="11">claude-md-mgmt   claude-setup</text>
  <rect x="60" y="518" width="200" height="22" rx="4" fill="#b45309" opacity="0.6"/>
  <text x="160" y="533" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="600">7 plugins</text>

  <!-- Superpowers Box -->
  <rect x="330" y="380" width="260" height="170" rx="12" fill="url(#spGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="460" y="410" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">Superpowers</text>
  <text x="460" y="428" text-anchor="middle" fill="#fca5a5" font-size="11">Discipline-Enforcing Skills</text>
  <line x1="360" y1="438" x2="560" y2="438" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
  <text x="350" y="458" fill="#e2e8f0" font-size="11">brainstorming     TDD</text>
  <text x="350" y="476" fill="#e2e8f0" font-size="11">writing-plans     debugging</text>
  <text x="350" y="494" fill="#e2e8f0" font-size="11">verification      code-review</text>
  <text x="350" y="512" fill="#e2e8f0" font-size="11">parallel-agents   worktrees</text>
  <rect x="350" y="518" width="200" height="22" rx="4" fill="#b91c1c" opacity="0.6"/>
  <text x="450" y="533" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">14 skills</text>

  <!-- Mysti Box -->
  <rect x="620" y="380" width="280" height="170" rx="12" fill="url(#mystiGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="760" y="410" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">Mysti</text>
  <text x="760" y="428" text-anchor="middle" fill="#a5f3fc" font-size="11">THE BRIDGE — VSCode Multi-Agent</text>
  <line x1="650" y1="438" x2="870" y2="438" stroke="#06b6d4" stroke-width="1" opacity="0.5"/>
  <text x="640" y="458" fill="#e2e8f0" font-size="11">5 brainstorm strategies</text>
  <text x="640" y="476" fill="#e2e8f0" font-size="11">@-mention routing (12 models)</text>
  <text x="640" y="494" fill="#e2e8f0" font-size="11">16 personas  |  12 skills</text>
  <text x="640" y="512" fill="#e2e8f0" font-size="11">Autonomous mode (3 levels)</text>
  <rect x="640" y="518" width="240" height="22" rx="4" fill="#0e7490" opacity="0.6"/>
  <text x="760" y="533" text-anchor="middle" fill="#a5f3fc" font-size="11" font-weight="600">VSCode extension (optional)</text>

  <!-- Claude Code Foundation -->
  <rect x="40" y="580" width="860" height="60" rx="12" fill="#1e293b" filter="url(#shadow)" stroke="#334155" stroke-width="1"/>
  <text x="470" y="610" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="700">Claude Code</text>
  <text x="470" y="628" text-anchor="middle" fill="#64748b" font-size="12">The Foundation — AI Agent CLI that powers everything above</text>

  <!-- Flow Arrows -->
  <!-- SC -> GSD -->
  <path d="M300,230 L330,230" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <!-- GSD -> MCP -->
  <path d="M590,230 L620,230" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <!-- Feedback loop -->
  <path d="M760,350 C760,370 470,375 170,350" stroke="#475569" stroke-width="1.5" fill="none" stroke-dasharray="6,4" marker-end="url(#arrowhead)"/>
  <text x="470" y="368" text-anchor="middle" fill="#475569" font-size="10" font-style="italic">feedback loops</text>

  <!-- Down arrows to Claude Code -->
  <path d="M170,550 L170,580" stroke="#475569" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <path d="M460,550 L460,580" stroke="#475569" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <path d="M760,550 L760,580" stroke="#475569" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Stats bar -->
  <rect x="930" y="110" width="240" height="530" rx="12" fill="#1e293b" filter="url(#shadow)" stroke="#334155" stroke-width="1"/>
  <text x="1050" y="140" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">Stack Totals</text>
  <line x1="955" y1="152" x2="1145" y2="152" stroke="#334155" stroke-width="1"/>

  <text x="960" y="180" fill="#c4b5fd" font-size="12" font-weight="600">SC Commands</text>
  <text x="1140" y="180" text-anchor="end" fill="#e2e8f0" font-size="14" font-weight="700">~30</text>

  <text x="960" y="210" fill="#93c5fd" font-size="12" font-weight="600">GSD Commands</text>
  <text x="1140" y="210" text-anchor="end" fill="#e2e8f0" font-size="14" font-weight="700">~37</text>

  <text x="960" y="240" fill="#6ee7b7" font-size="12" font-weight="600">MCP Servers</text>
  <text x="1140" y="240" text-anchor="end" fill="#e2e8f0" font-size="14" font-weight="700">4</text>

  <text x="960" y="270" fill="#fde68a" font-size="12" font-weight="600">Plugins</text>
  <text x="1140" y="270" text-anchor="end" fill="#e2e8f0" font-size="14" font-weight="700">7</text>

  <text x="960" y="300" fill="#fca5a5" font-size="12" font-weight="600">Superpowers</text>
  <text x="1140" y="300" text-anchor="end" fill="#e2e8f0" font-size="14" font-weight="700">14</text>

  <text x="960" y="330" fill="#a5f3fc" font-size="12" font-weight="600">Mysti Providers</text>
  <text x="1140" y="330" text-anchor="end" fill="#e2e8f0" font-size="14" font-weight="700">12</text>

  <text x="960" y="360" fill="#cbd5e1" font-size="12" font-weight="600">Native Skills</text>
  <text x="1140" y="360" text-anchor="end" fill="#e2e8f0" font-size="14" font-weight="700">5</text>

  <line x1="955" y1="380" x2="1145" y2="380" stroke="#334155" stroke-width="1"/>
  <text x="960" y="405" fill="#f8fafc" font-size="14" font-weight="700">TOTAL</text>
  <text x="1140" y="405" text-anchor="end" fill="#f8fafc" font-size="20" font-weight="700">100+</text>

  <!-- Profiles -->
  <line x1="955" y1="425" x2="1145" y2="425" stroke="#334155" stroke-width="1"/>
  <text x="1050" y="450" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="700">Stack Profiles</text>

  <rect x="960" y="465" width="160" height="24" rx="6" fill="#059669" opacity="0.3" stroke="#059669" stroke-width="1"/>
  <text x="1040" y="482" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">Minimal (3 tools)</text>

  <rect x="960" y="497" width="160" height="24" rx="6" fill="#2563eb" opacity="0.3" stroke="#2563eb" stroke-width="1"/>
  <text x="1040" y="514" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">Standard (6 tools)</text>

  <rect x="960" y="529" width="160" height="24" rx="6" fill="#7c3aed" opacity="0.3" stroke="#7c3aed" stroke-width="1"/>
  <text x="1040" y="546" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">Full (10+ tools)</text>

  <rect x="960" y="561" width="160" height="24" rx="6" fill="#0891b2" opacity="0.3" stroke="#0891b2" stroke-width="1"/>
  <text x="1040" y="578" text-anchor="middle" fill="#a5f3fc" font-size="11" font-weight="600">VSCode-First</text>

  <!-- Footer -->
  <text x="600" y="668" text-anchor="middle" fill="#475569" font-size="11">github.com/effeuteha/claude-stack</text>
  <text x="600" y="688" text-anchor="middle" fill="#334155" font-size="10">Built by developers who got tired of having 100 tools and no manual.</text>
</svg>
