<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">claude-stack: four-layer architecture</title>
  <desc id="desc">Four stacked layers: Discipline (Superpowers) wraps Strategic (SuperClaude), Lifecycle (GSD), and Code (Serena + Context7).</desc>

  <rect x="20" y="20" width="860" height="480" rx="16" fill="none" stroke="#0F766E" stroke-width="3" stroke-dasharray="6 4"/>
  <text x="40" y="48" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#0F766E" font-weight="700">DISCIPLINE — Superpowers</text>
  <text x="40" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#0F766E">brainstorm-first · TDD · verify-before-complete · systematic-debugging · worktrees · subagents · plans</text>

  <rect x="60" y="100" width="780" height="100" rx="12" fill="#DBEAFE" stroke="#1E40AF" stroke-width="2"/>
  <text x="80" y="130" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#1E40AF" font-weight="700">STRATEGIC — SuperClaude</text>
  <text x="80" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#1E40AF">research · brainstorm · design · analyze · spec-panel · business-panel</text>
  <text x="80" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#475569" font-style="italic">What to build and why</text>

  <path d="M 450 210 L 450 230" stroke="#334155" stroke-width="2" fill="none"/>
  <path d="M 450 230 L 444 222 M 450 230 L 456 222" stroke="#334155" stroke-width="2" fill="none"/>

  <rect x="60" y="240" width="780" height="120" rx="12" fill="#FEF3C7" stroke="#92400E" stroke-width="2"/>
  <text x="80" y="270" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#92400E" font-weight="700">LIFECYCLE — GSD</text>
  <text x="80" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#92400E">spec → discuss → plan → execute → verify → ship · workstreams · threads</text>
  <text x="80" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#92400E">debug · forensics · audit-fix · ai-integration · ui · sketch · spike</text>
  <text x="80" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#475569" font-style="italic">Shepherding the work</text>

  <path d="M 450 370 L 450 390" stroke="#334155" stroke-width="2" fill="none"/>
  <path d="M 450 390 L 444 382 M 450 390 L 456 382" stroke="#334155" stroke-width="2" fill="none"/>

  <rect x="60" y="400" width="780" height="80" rx="12" fill="#E0E7FF" stroke="#3730A3" stroke-width="2"/>
  <text x="80" y="430" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#3730A3" font-weight="700">CODE — Serena + Context7</text>
  <text x="80" y="455" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#3730A3">symbols · memories · query-docs · resolve-library-id</text>
  <text x="80" y="475" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#475569" font-style="italic">Manipulating the code itself</text>
</svg>
